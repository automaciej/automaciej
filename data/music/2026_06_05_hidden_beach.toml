project = "maciej"

description = """\
When crowds overran Dublin beaches on the hottest day in Ireland since 2022, \
Bliziński and his partner climbed down a cliff face to a small, unmapped cove. \
A water bottle that slipped on the way down, scratched and dented but holding \
water. It became the central metaphor: that the cost of going somewhere worth going \
is inseparable from the going. Written in a single sitting that afternoon; \
produced in Dolby Atmos.\
"""

