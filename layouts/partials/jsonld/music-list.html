{{- $baseURL := .Site.BaseURL -}}
{{- $allMusic := sort hugo.Data.music "date" "desc" -}}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "ItemList",
  "name": "Music Productions",
  "url": {{ .Permalink | jsonify | safeJS }},
  "itemListElement": [
    {{- range $i, $m := $allMusic }}{{ if $i }},{{ end }}
    {
      "@type": "ListItem",
      "position": {{ add $i 1 }},
      "item": {
        "@type": {{ if $m.album }}"MusicAlbum"{{ else }}"MusicRecording"{{ end }},
        "name": {{ $m.title | jsonify | safeJS }},
        "byArtist": { "@type": "MusicGroup", "name": {{ $m.artist | jsonify | safeJS }} },
        "datePublished": {{ dateFormat "2006-01-02" $m.date | jsonify | safeJS }},
        "url": {{ printf "%smusic/#%s" $baseURL ($m.title | urlize) | jsonify | safeJS }}
        {{- with $m.image }},
        "image": {{ printf "%simages/music/%s" $baseURL . | jsonify | safeJS }}{{ end }}
        {{- if $m.description }},
        "description": {{ $m.description | jsonify | safeJS }}{{ end }}
        {{- if or (eq $m.composition_origin "cover") (eq $m.composition_origin "standard") }},
        "recordingOf": {
          "@type": "MusicComposition",
          "name": {{ $m.title | jsonify | safeJS }}
          {{- with $m.original_artist }},
          "composer": { "@type": "MusicGroup", "name": {{ . | jsonify | safeJS }} }{{ end }}
        }{{ end }}
        {{- with $m.credits }},
        "creditedTo": [
          {{- $first := true }}
          {{- range . }}
            {{- $person := .name }}
            {{- range .roles }}{{ if not $first }},{{ end }}{{ $first = false }}
          { "@type": "Role", "roleName": {{ . | jsonify | safeJS }}, "creditedTo": { "@type": "Person", "name": {{ $person | jsonify | safeJS }} } }
            {{- end }}
          {{- end }}
        ]{{ end }}
        {{- with $m.links }}
          {{- $first := true }}
          {{- $hasBandcamp := .bandcamp_url }}{{- $hasStreaming := .streaming }}
          {{- $hasSpotify := .spotify }}{{- $hasApple := .apple_music }}{{- $hasYoutube := .youtube }}
          {{- if or $hasBandcamp $hasStreaming $hasSpotify $hasApple $hasYoutube }},
        "potentialAction": { "@type": "ListenAction", "target": [
          {{- with .bandcamp_url }}{{ if not $first }},{{ end }}{{ $first = false }}
          { "@type": "EntryPoint", "name": "Bandcamp", "urlTemplate": {{ . | jsonify | safeJS }} }{{ end }}
          {{- with .spotify }}{{ if not $first }},{{ end }}{{ $first = false }}
          { "@type": "EntryPoint", "name": "Spotify", "urlTemplate": {{ . | jsonify | safeJS }} }{{ end }}
          {{- with .apple_music }}{{ if not $first }},{{ end }}{{ $first = false }}
          { "@type": "EntryPoint", "name": "Apple Music", "urlTemplate": {{ . | jsonify | safeJS }} }{{ end }}
          {{- with .youtube }}{{ if not $first }},{{ end }}{{ $first = false }}
          { "@type": "EntryPoint", "name": "YouTube", "urlTemplate": {{ printf "https://youtube.com/watch?v=%s" . | jsonify | safeJS }} }{{ end }}
          {{- with .streaming }}{{ if not $first }},{{ end }}{{ $first = false }}
          { "@type": "EntryPoint", "name": "Streaming", "urlTemplate": {{ . | jsonify | safeJS }} }{{ end }}
        ] }{{ end }}
        {{- end }}
      }
    }
    {{- end }}
  ]
}
</script>
{{- $videos := slice -}}
{{- range hugo.Data.music -}}
  {{- if and .links .links.youtube -}}
    {{- $videos = $videos | append . -}}
  {{- end -}}
{{- end -}}
{{- if $videos -}}
<script type="application/ld+json">
[
  {{- range $i, $v := $videos }}{{ if $i }},{{ end }}
  {
    "@context": "https://schema.org",
    "@type": "VideoObject",
    "name": {{ $v.title | jsonify | safeJS }},
    "description": {{ ($v.description | default $v.title) | jsonify | safeJS }},
    "thumbnailUrl": {{ printf "https://img.youtube.com/vi/%s/maxresdefault.jpg" $v.links.youtube | jsonify | safeJS }},
    "embedUrl": {{ printf "https://www.youtube.com/embed/%s" $v.links.youtube | jsonify | safeJS }},
    "uploadDate": {{ dateFormat "2006-01-02" $v.date | jsonify | safeJS }},
    "url": {{ printf "https://www.youtube.com/watch?v=%s" $v.links.youtube | jsonify | safeJS }}
  }
  {{- end }}
]
</script>
{{- end -}}
